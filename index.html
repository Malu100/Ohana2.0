<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="form.css" />
    <title>Ohana</title>
</head>
<body>

  <div class="container">
    <h1>Faça seu Pedido</h1>
    <form id="formPedido">
      
      <label>Nome completo</label>
      <input type="text" name="nome" placeholder="Seu nome" required />
      
       <label>Telefone / WhatsApp</label>
      <input type="tel" name="telefone" placeholder="(00) 00000-0000" required />

      <label>Endereço de entrega</label>
      <textarea name="endereco" placeholder="Rua, número, bairro, cidade..." required></textarea>

      <label>Selecione as Peças</label>
      <div class="catalogo-grid">

        <!-- REMOVIDO O 'required' DAQUI -->
        <label class="card-peca">
          <input type="checkbox" name="peca" value="Conjunto Moletom" data-preco="240.00">
          <div class="card-conteudo">
            <img src="imgs/conjunto _40.jfif" alt="Moletom">
            <span>Conjunto Moletom</span>
            <small>R$ 240,00</small>

            <select class="select-tamanho-item">
                      <option value="M">M</option>
                      <option value="G">G</option>
                      <option value="GG">GG</option>
                      <option value="G1">G1</option>
            </select>

            
          </div>
        </label>

        <label class="card-peca">
          <input type="checkbox" name="peca" value="Camiseta Oakley" data-preco="80.00">
          <div class="card-conteudo">
            <img src="imgs/camisetas_oakley_edição _80.jfif" alt="Camiseta">
            <span>Camiseta Oakley Edição</span>
            <small>R$ 80,00</small>

            <select class="select-tamanho-item">
                      <option value="M">M</option>
                      <option value="G">G</option>
                      <option value="GG">GG</option>
                      <option value="G1">G1</option>
            </select>
            
          </div>
        </label>

        <label class="card-peca">
          <input type="checkbox" name="peca" value="Camiseta surf + boné" data-preco="150.00">
          <div class="card-conteudo">
            <img src="imgs/camiseta _surf_boné_150.jfif" alt="Camiseta">
            <span>Camiseta surf + boné</span>
            <small>R$ 150,00</small>

            <select class="select-tamanho-item">
                      <option value="M">M</option>
                      <option value="G">G</option>
                      <option value="GG">GG</option>
                      <option value="G1">G1</option>
            </select>
            
          </div>
        </label>

        <label class="card-peca">
          <input type="checkbox" name="peca" value="Camiseta de time TAILANDESA" data-preco="160.00">
          <div class="card-conteudo">
            <img src="imgs/camiseta_de_time_tailandesa_160.jfif" alt="Camiseta">
            <span>Camiseta de time TAILANDESA</span>
            <small>R$ 160,00</small>

            <select class="select-tamanho-item">
                      <option value="M">M</option>
                      <option value="G">G</option>
                      <option value="GG">GG</option>
                      <option value="G1">G1</option>
            </select>
            
          </div>
        </label>

        <label class="card-peca">
          <input type="checkbox" name="peca" value="Bermuda Cargo" data-preco="100.00">
          <div class="card-conteudo">
            <img src="imgs/bermuda_cargo_100.jfif" alt="Camiseta">
            <span>Camiseta Oakley Edição</span>
            <small>R$ 100,00</small>

            <select class="select-tamanho-item">
                      <option value="M">M</option>
                      <option value="G">G</option>
                      <option value="GG">GG</option>
                      <option value="G1">G1</option>
            </select>
            
          </div>
        </label>


        <label class="card-peca">
          <input type="checkbox" name="peca" value="Corta Vento" data-preco="170.00">
          <div class="card-conteudo">
            <img src="imgs/corta_vento_170.jpeg" alt="Camiseta">
            <span>Camiseta Oakley Edição</span>
            <small>R$ 170,00</small>

            <select class="select-tamanho-item">
                      <option value="M">M</option>
                      <option value="G">G</option>
                      <option value="GG">GG</option>
                      <option value="G1">G1</option>
            </select>
            
          </div>
        </label>


        <label class="card-peca">
          <input type="checkbox" name="peca" value="Camiseta Oakley" data-preco="80.00">
          <div class="card-conteudo">
            <img src="imgs/bone_grife_80.jfif" alt="Bone">
            <span>Boné Grife</span>
            <small>R$ 80,00</small>

            <select class="select-tamanho-item">
                      <option value="M">M</option>
                      <option value="G">G</option>
                      <option value="GG">GG</option>
                      <option value="G1">G1</option>
            </select>
            
          </div>
        </label>

        <label class="card-peca">
          <input type="checkbox" name="peca" value="Calça Jeans" data-preco="120.00">
          <div class="card-conteudo">
            <img src="imgs/calca_jeans_120.jfif" alt="Calca">
            <span>Camiseta Oakley Edição</span>
            <small>R$ 120,00</small>

            <select class="select-tamanho-item">
                      <option value="M">M</option>
                      <option value="G">G</option>
                      <option value="GG">GG</option>
                      <option value="G1">G1</option>
            </select>
            
          </div>
        </label>


        <label class="card-peca">
          <input type="checkbox" name="peca" value="Calça Moletom" data-preco="100.00">
          <div class="card-conteudo">
            <img src="imgs/calca_moletom_100.jfif" alt="Calca">
            <span>Calça Moletom</span>
            <small>R$ 100,00</small>

            <select class="select-tamanho-item">
                      <option value="M">M</option>
                      <option value="G">G</option>
                      <option value="GG">GG</option>
                      <option value="G1">G1</option>
            </select>
            
          </div>
        </label>
        
        <label class="card-peca">
          <!-- CORRIGIDO DE 180,00 PARA 180.00 -->
          <input type="checkbox" name="peca" value="Tenis Oakley" data-preco="650.00">
          <div class="card-conteudo">
            <img src="imgs/tenis_oakley_650.jfif" alt="Tenis">
            <span>Tenis Oakley</span>
            <small>R$ 650,00</small>

            <select class="select-tamanho-item">
                      <option value="38">38</option>
                      <option value="39">39</option>
                      <option value="40">40</option>
                      <option value="41">41</option>
            </select>



          </div>
        </label>
      </div>

      <label>Forma de Pagamento</label>
      <select name="pagamento" required>
        <option value="">Selecione...</option>
        <option value="Pix">Pix</option>
        <option value="Cartão de Crédito">Cartão de Crédito (com juros da maquininha)</option>
        <option value="Cartão de Débito">Cartão de Débito</option>
        <option value="Dinheiro">Dinheiro</option>
      </select>



      <label>Preço Total (R$ )</label>
      <input type="text" name="preco" id="inputPreco" value="0.00" readonly />

      <button type="submit">Enviar Pedido</button>
      
    </form>
    <p id="mensagem"></p>
  </div>
  <script src="form.js"></script>


</body>
</html>
